<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebPro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* Navbar */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

nav h2{
  color:#38bdf8;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* Hero */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  opacity:0.8;
}

.btn{
  display:inline-block;
  margin-top:20px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  padding:12px 30px;
  border-radius:12px;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* Sections */
.section{
  padding:80px 20px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  width:260px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  padding:10px;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

/* Portfolio */
.portfolio{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.portfolio img{
  width:300px;
  border-radius:15px;
  transition:0.3s;
}

.portfolio img:hover{
  transform:scale(1.05);
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style>

</head>

<body>

<nav>
  <h2>WebPro</h2>
  <div>
    <a href="#">الرئيسية</a>
    <a href="#services">الخدمات</a>
    <a href="#portfolio">أعمالنا</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>🚀 تصميم مواقع احترافية</h1>
  <p>نحوّل فكرتك إلى موقع حقيقي يربح المال 💰</p>
  <a href="#" class="btn">ابدأ الآن</a>
</section>

<!-- Services -->
<section class="section" id="services">
  <h2>✨ خدماتنا</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <h3>💻 تطوير مواقع</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1559028012-481c04fa702d">
      <h3>🎨 تصميم UI/UX</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6">
      <h3>⚡ أداء وسرعة</h3>
    </div>

  </div>
</section>

<!-- Portfolio -->
<section class="section" id="portfolio">
  <h2>💼 أعمالنا</h2>

  <div class="portfolio">
    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c">
  </div>
</section>

<footer>
  © 2026 WebPro
</footer>

</body>
</html>
