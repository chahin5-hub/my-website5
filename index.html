<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebPro</title>

<!-- AOS Animation -->
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* Navbar */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* Hero */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:50px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  padding:12px 30px;
  border-radius:12px;
  color:black;
}

/* Section */
.section{
  padding:80px 20px;
  text-align:center;
}

/* Cards */
.cards{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  width:260px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.05);
}

/* Pricing */
.pricing{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.price{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:200px;
}

.price button{
  margin-top:10px;
  background:#38bdf8;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* Portfolio */
.portfolio img{
  width:280px;
  margin:10px;
  border-radius:15px;
}

/* WhatsApp */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:25px;
  color:white;
  text-decoration:none;
}
</style>

</head>

<body>

<nav>
  <h2>WebPro</h2>
  <div>
    <a href="#services">الخدمات</a>
    <a href="#pricing">الأسعار</a>
    <a href="#portfolio">أعمالنا</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero" data-aos="fade-up">
  <h1>🚀 موقع احترافي مثل Fiverr</h1>
  <p>ابدأ الربح من خدماتك الآن 💰</p>
  <a href="#pricing" class="btn">ابدأ الآن</a>
</section>

<!-- Services -->
<section class="section" id="services">
  <h2 data-aos="fade-up">✨ خدماتنا</h2>

  <div class="cards">
    <div class="card" data-aos="fade-right">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
      <h3>تطوير مواقع</h3>
    </div>

    <div class="card" data-aos="fade-up">
      <img src="https://images.unsplash.com/photo-1559028012-481c04fa702d">
      <h3>تصميم UI</h3>
    </div>

    <div class="card" data-aos="fade-left">
      <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6">
      <h3>تحسين الأداء</h3>
    </div>
  </div>
</section>

<!-- Pricing -->
<section class="section" id="pricing">
  <h2 data-aos="fade-up">💰 الأسعار</h2>

  <div class="pricing">
    <div class="price" data-aos="zoom-in">
      <h3>Basic</h3>
      <p>10$</p>
      <button onclick="order()">اطلب</button>
    </div>

    <div class="price" data-aos="zoom-in">
      <h3>Pro</h3>
      <p>25$</p>
      <button onclick="order()">اطلب</button>
    </div>

    <div class="price" data-aos="zoom-in">
      <h3>VIP</h3>
      <p>50$</p>
      <button onclick="order()">اطلب</button>
    </div>
  </div>
</section>

<!-- Portfolio -->
<section class="section" id="portfolio">
  <h2 data-aos="fade-up">💼 أعمالنا</h2>

  <div class="portfolio">
    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f" data-aos="zoom-in">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" data-aos="zoom-in">
    <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c" data-aos="zoom-in">
  </div>
</section>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/213XXXXXXXXX">💬</a>

<!-- Scripts -->
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
AOS.init();

function order(){
  window.location.href = "https://wa.me/213XXXXXXXXX";
}
</script>

</body>
</html>
