<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أعمالي</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* عنوان */
h1 {
  text-align: center;
  margin-top: 20px;
}

/* الأزرار */
.filters {
  text-align: center;
  margin: 20px;
}

.filters button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.filters button:hover {
  transform: scale(1.1);
  background: #0ea5e9;
}

/* المشاريع */
.projects {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.project {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  width: 230px;
  text-align: center;
  transition: 0.3s;
}

.project img {
  width: 100%;
  border-radius: 10px;
}

.project:hover {
  transform: translateY(-10px) scale(1.05);
}

</style>

</head>

<body>

<h1>💼 أعمالي</h1>

<div class="filters">
  <button onclick="filterProjects('all')">الكل</button>
  <button onclick="filterProjects('web')">مواقع</button>
  <button onclick="filterProjects('design')">تصميم</button>
</div>

<div class="projects">

  <div class="project web">
    <img src="https://source.unsplash.com/300x200/?website">
    <h3>موقع شركة</h3>
    <p>تصميم موقع احترافي</p>
  </div>

  <div class="project design">
    <img src="https://source.unsplash.com/300x200/?design">
    <h3>تصميم UI</h3>
    <p>واجهة عصرية</p>
  </div>

  <div class="project web">
    <img src="https://source.unsplash.com/300x200/?ecommerce">
    <h3>متجر إلكتروني</h3>
    <p>بيع منتجات</p>
  </div>

</div>

<script>
function filterProjects(type) {
  let projects = document.querySelectorAll(".project");

  projects.forEach(p => {
    if (type === "all") {
      p.style.display = "block";
    } else if (p.classList.contains(type)) {
      p.style.display = "block";
    } else {
      p.style.display = "none";
    }
  });
}
</script>

</body>
</html>
